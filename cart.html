<html>

<head>
    <title>Your Cart</title>

    <style>
        body {
            background-image: url("images/background.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            text-align: center;
            font-family: Georgia;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            margin: auto;
            width: 60%;
            border-collapse: collapse;
            background-color: rgba(255, 255, 255, 0.9);
        }

        th,
        td {
            padding: 12px;
            border: 1px solid black;
        }

        th {
            background-color: #a0522d;
            color: white;
        }

        .total {
            font-size: 22px;
            margin-top: 20px;
        }

        .note {
            font-size: 16px;
            margin: 10px;
        }

        .back {
            background-color: red;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .cart-btn {
            background-color: #a0522d;
            color: white;
            padding: 10px 18px;
            border: none;
            cursor: pointer;
            margin: 10px;
        }
    </style>

</head>

<body>

    <br>

    <img src="images/logo.jpeg" width="120">

    <h1>Your Cart 🛒</h1>

    <p class="note">
        (This is a demo cart page — items are static because no JavaScript is used)
    </p>

    <br>

    <table>

        <tr>
            <th>Book</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>The Magic Kingdom</td>
            <td>₹499</td>
        </tr>

        <tr>
            <td>Dragon Realm</td>
            <td>₹699</td>
        </tr>

        <tr>
            <td>Cursed Mirror</td>
            <td>₹599</td>
        </tr>

    </table>

    <div class="total">
        Total: ₹1797
    </div>

    <br>
    <a href="checkout.html">
        <button>Proceed to Checkout 💳</button>
    </a>
    <br>

    <a href="index.html">
        <button class="back">Back</button>
    </a>

    <br><br>

</body>

</html>
